name: Mac Release

on:
  workflow_call:
    inputs:
      version:
        description: "Release version label"
        required: true
        type: string
      apply_release_patch:
        description: "Apply the shared release patch artifact before building"
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version label"
        required: false
        type: string
      apply_release_patch:
        description: "Apply release patch artifact from the current run"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: "24.14.0"

permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      ARTIFACT_VERSION: ${{ inputs.version != '' && inputs.version || github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release patch
        if: inputs.apply_release_patch == true
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .release-plan

      - name: Apply release patch
        if: inputs.apply_release_patch == true
        run: git apply --binary .release-plan/release.patch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Apple certificates and API key
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 -d > /tmp/AuthKey.p8
          mkdir -p ~/certificates
          echo "${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}" | base64 -d > ~/certificates/developer_id_application.p12

          security create-keychain -p "temp_keychain_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_keychain_password" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import ~/certificates/developer_id_application.p12 \
            -k build.keychain \
            -P "${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}" \
            -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_keychain_password" build.keychain

          echo "MAC_CODESIGN_IDENTITY=Developer ID Application: Marcelo Jimenez (TLBS4N7QZ3)" >> $GITHUB_ENV
          echo "APPLE_API_KEY_FILE=/tmp/AuthKey.p8" >> $GITHUB_ENV

      - name: Build and sign application
        run: |
          npm run build -w @mcpjam/inspector

          sudo diskutil unmountDisk force /Volumes/"MCPJam Inspector" 2>/dev/null || true
          hdiutil detach /Volumes/"MCPJam Inspector" -force 2>/dev/null || true

          npm run electron:make -w @mcpjam/inspector

          sudo diskutil unmountDisk force /Volumes/"MCPJam Inspector" 2>/dev/null || true
          hdiutil detach /Volumes/"MCPJam Inspector" -force 2>/dev/null || true
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Notarize and staple DMG
        run: |
          DMG_PATH=$(find "$GITHUB_WORKSPACE/mcpjam-inspector/out/make" -name "*.dmg" | head -n1)
          if [ ! -f "$DMG_PATH" ]; then
            echo "DMG file not found" >&2
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --key /tmp/AuthKey.p8 \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --wait

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

          cp "$DMG_PATH" "$GITHUB_WORKSPACE/MCPJam.Inspector.dmg"
          echo "DMG_PATH=$GITHUB_WORKSPACE/MCPJam.Inspector.dmg" >> $GITHUB_ENV

      - name: Notarize ZIP
        run: |
          ZIP_PATH=$(find "$GITHUB_WORKSPACE/mcpjam-inspector/out/make" -name "*.zip" | head -n1)
          if [ ! -f "$ZIP_PATH" ]; then
            echo "ZIP file not found" >&2
            exit 1
          fi

          xcrun notarytool submit "$ZIP_PATH" \
            --key /tmp/AuthKey.p8 \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --wait

          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Create stapled app ZIP for auto-updates
        run: |
          cd "$(dirname "$ZIP_PATH")"
          unzip -q "$(basename "$ZIP_PATH")" -d notarized

          APP_PATH=$(find notarized -name "*.app" | head -n1)
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found in ZIP" >&2
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          STAPLED_ZIP="$GITHUB_WORKSPACE/MCPJam Inspector-stapled.zip"
          ditto -c -k --keepParent "$APP_PATH" "$STAPLED_ZIP"
          echo "STAPLED_ZIP=$STAPLED_ZIP" >> $GITHUB_ENV

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f /tmp/AuthKey.p8
          rm -rf ~/certificates
          security delete-keychain build.keychain || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inspector-macos-${{ env.ARTIFACT_VERSION }}
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
            ${{ env.STAPLED_ZIP }}
          retention-days: 14
